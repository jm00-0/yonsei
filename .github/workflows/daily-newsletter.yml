name: Daily Newsletter

on:
  schedule:
    # 07:00 UTC = 16:00 KST
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Report date in YYYY-MM-DD. Leave empty to use today."
        required: false
        type: string

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    env:
      GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily newsletter
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.run_daily_newsletter "${{ github.event.inputs.date }}"
          else
            python -m src.run_daily_newsletter
          fi
